<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Captioning</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Load Transformers.js as an ES module -->
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#8b5cf6" />
                        </linearGradient>
                    </defs>
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <h1>Vision<span class="highlight">Caption</span> AI</h1>
            </div>
            <p class="subtitle">Extract intelligent captions from any image using state-of-the-art Transformer models right in your browser.</p>
        </header>

        <main>
            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" accept="image/*" hidden>
                
                <div class="upload-content" id="upload-content">
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p>Drag & drop an image here</p>
                    <span class="or-text">or</span>
                    <div class="action-row">
                        <button class="select-btn" onclick="document.getElementById('file-input').click()">Browse Files</button>
                        <button class="select-btn capture-btn" id="start-webcam-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                            Take Photo
                        </button>
                    </div>
                </div>

                <!-- Webcam Area -->
                <div class="webcam-container hidden" id="webcam-container">
                    <video id="webcam-video" autoplay playsinline></video>
                    <div class="webcam-controls">
                        <button id="capture-btn" class="primary-btn small-btn">Snap Photo!</button>
                    </div>
                    <button class="remove-btn" id="close-webcam-btn" title="Close Camera">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>

                <!-- Image Preview Area -->
                <div class="preview-container hidden" id="preview-container">
                    <img id="image-preview" src="" alt="Preview">
                    <button class="remove-btn" id="remove-btn" title="Remove Image">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>

            <div class="controls">
                <div class="status" id="model-status">Initializing...</div>
                
                <!-- Model Download Progress Bar -->
                <div class="progress-container hidden" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="progress-text hidden" id="progress-text">0%</div>

                <button id="generate-btn" class="primary-btn" disabled>
                    <span id="btn-text">Generate Caption</span>
                    <div class="spinner hidden" id="btn-spinner"></div>
                </button>
            </div>

            <div class="result-area hidden" id="result-area">
                <div class="caption-box">
                    <h3>Generated Caption:</h3>
                    <p id="caption-text">A beautiful landscape with mountains and a lake.</p>
                    
                    <div class="tags-container" id="tags-container">
                        <!-- Tags will be dynamically inserted here -->
                    </div>

                    <div class="action-buttons">
                        <button id="copy-btn" class="action-btn" title="Copy to clipboard">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" class="feather" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy
                        </button>
                        <button id="speak-btn" class="action-btn" title="Read aloud">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" class="feather" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                            Listen
                        </button>
                        <button id="download-btn" class="action-btn" title="Download Image Card">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Export Card
                        </button>
                    </div>
                </div>
            </div>
            
            <canvas id="offscreen-canvas"></canvas>
            
        </main>
    </div>

    <!-- Define Javascript module -->
    <script type="module" src="script.js"></script>
</body>
</html>
