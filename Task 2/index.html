<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unbeatable Tic-Tac-Toe AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Confetti Script for winning -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tic-Tac-Toe vs <span class="ai-text">AI</span></h1>
            <p class="subtitle">Dare to challenge the machine?</p>
        </header>

        <div class="game-control">
            <div class="difficulty-selection">
                <p>Select Difficulty:</p>
                <div class="btn-group diff-group">
                    <button id="diff-easy" class="choice-btn diff-btn" data-diff="easy">Easy</button>
                    <button id="diff-medium" class="choice-btn diff-btn" data-diff="medium">Medium</button>
                    <button id="diff-hard" class="choice-btn diff-btn active" data-diff="hard">Unbeatable</button>
                </div>
            </div>
            
            <div class="player-name-input">
                <input type="text" id="player-name" placeholder="Enter your name" maxlength="15" autocomplete="off">
            </div>
            
            <div class="player-selection">
                <p>Choose your mark:</p>
                <div class="btn-group">
                    <button id="btn-x" class="choice-btn player-btn active" data-player="X">Play as X <br><span class="btn-subtitle">You go first</span></button>
                    <button id="btn-o" class="choice-btn player-btn" data-player="O">Play as O <br><span class="btn-subtitle">AI goes first</span></button>
                </div>
            </div>
            <button id="start-btn" class="primary-btn">Start Game</button>
        </div>

        <div class="game-board-container hidden" id="board-container">
            <div class="scoreboard">
                <div class="score-card player-score-card">
                    <span class="score-label" id="player-score-label">You</span>
                    <span class="score-value" id="score-player">0</span>
                </div>
                <div class="score-card tie-score-card">
                    <span class="score-label">Ties</span>
                    <span class="score-value" id="score-ties">0</span>
                </div>
                <div class="score-card ai-score-card">
                    <span class="score-label">AI</span>
                    <span class="score-value" id="score-ai">0</span>
                </div>
            </div>

            <div class="status-panel">
                <div id="turn-indicator" class="turn-indicator">Your Turn (X)</div>
            </div>
            
            <div class="board" id="board">
                <!-- Cells generated by JS -->
            </div>
            
            <div class="action-buttons">
                <button id="restart-btn" class="secondary-btn">Reset Match</button>
                <button id="back-btn" class="secondary-btn ghost-btn">Main Menu</button>
            </div>
        </div>
        
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-icon" id="modal-icon">🤖</div>
                <h2 id="result-message">You Lose!</h2>
                <div class="modal-actions">
                    <button id="modal-restart-btn" class="primary-btn">Play Again</button>
                    <button id="modal-menu-btn" class="secondary-btn ghost-btn">Menu</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
