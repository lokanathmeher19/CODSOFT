<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unbeatable Tic-Tac-Toe AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tic-Tac-Toe vs <span class="ai-text">AI</span></h1>
            <p class="subtitle">Can you beat the unbeatable?</p>
        </header>

        <div class="game-control">
            <div class="difficulty-toggle">
                <span class="active">Unbeatable AI (Minimax)</span>
            </div>
            <div class="player-name-input">
                <input type="text" id="player-name" placeholder="Enter your name" maxlength="15" autocomplete="off">
            </div>
            <div class="player-selection">
                <p>Choose your mark:</p>
                <div class="btn-group">
                    <button id="btn-x" class="choice-btn active" data-player="X">Play as X <br><span class="btn-subtitle">You go first</span></button>
                    <button id="btn-o" class="choice-btn" data-player="O">Play as O <br><span class="btn-subtitle">AI goes first</span></button>
                </div>
            </div>
            <button id="start-btn" class="primary-btn">Start Game</button>
        </div>

        <div class="game-board-container hidden" id="board-container">
            <div class="status-panel">
                <div id="turn-indicator" class="turn-indicator">Your Turn (X)</div>
            </div>
            <div class="board" id="board">
                <!-- Cells generated by JS -->
            </div>
            <button id="restart-btn" class="secondary-btn">Play Again</button>
        </div>
        
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="result-message">You Lose!</h2>
                <button id="modal-restart-btn" class="primary-btn">Play Again</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
